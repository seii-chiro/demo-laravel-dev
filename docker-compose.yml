services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: docker-laravel-dev-app
    networks:
      - laravel-network

  nginx:
    build:
      context: .
      dockerfile: Dockerfile
    image: docker-laravel-dev-nginx
    depends_on:
      - app
    networks:
      - laravel-network

  db:
    image: postgres:18.4-alpine
    environment:
      POSTGRES_DB: ${DB_DATABASE:-docker_laravel_dev}
      POSTGRES_USER: ${DB_USERNAME:-laravel}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secret}
    volumes:
      - laravel_pgdata:/var/lib/postgresql
    networks:
      - laravel-network

networks:
  laravel-network:
    driver: bridge

volumes:
  laravel_pgdata:
  laravel_vendor:
